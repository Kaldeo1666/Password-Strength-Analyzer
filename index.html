<!DOCTYPE html>
<html>
<head>
    <title>Password Strength Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Password Strength Analyzer</h2>

        <input type="password" id="password" placeholder="Enter your password" oninput="checkStrength()">

        <ul id="rules">
    <li id="length">✔ At least 8 characters</li>
    <li id="uppercase">✔ Contains uppercase letter</li>
    <li id="number">✔ Contains a number</li>
    <li id="special">✔ Contains special character</li>
</ul>

        <div id="strength-text"></div>
        <div class="strength-bar">
            <div id="strength-bar-fill"></div>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
